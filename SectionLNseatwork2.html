<!DOCTYPE html>
<html>
<head>
  <meta name="author" content="Charles Oswin A. Dela Cruz" />
  <meta name="revised" content="March 28, 2026" />
  <style>
    body { font-family: Arial, sans-serif; }

    .header, .footer {
      background: lightblue;
      padding: 10px;
    }

    /* Step 2 (Fixed) */
    .footer {
      opacity: 0.5;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    /* Step 1 (Relative) */
    .sidebar {
      background: lightgreen;
      width: 150px;
      height: 200px;
      position: relative;
      top: 20px;
      left: 20px;
    }

    /* Step 3 (Absolute) + Step 4 (z-index) */
    .content {
      background: lightyellow;
      width: 300px;
      height: 200px;
      position: absolute;
      top: 66px;
      left: 200px;
      z-index: 1;
    }

    /* Step 4 (Absolute + z-index layering) */
    .notice {
      position: absolute;
      top: 60px;
      left: 400px;
      background: orange;
      padding: 10px;
      z-index: 2;
    }

  </style>
</head>
<body>

  <div class="header">Header</div>

  <div class="sidebar">
    Sidebar
    <!-- Step 1 applied: moved using relative positioning -->
  </div>

  <div class="content">
    Main Content
    <!-- Step 3 applied: absolute positioning -->
    <!-- Step 4: z-index set to 1 -->
  </div>

  <!-- Step 4 element added -->
  <div class="notice">Notice!</div>

  <div class="footer">
    Footer
    <!-- Step 2 applied: fixed at bottom -->
  </div>

</body>
</html>
